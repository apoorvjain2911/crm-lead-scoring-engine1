services:
  - type: web
    name: crm-lead-scoring-engine-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"